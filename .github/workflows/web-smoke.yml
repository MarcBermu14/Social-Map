name: CityLive Web Smoke Test

on:
  push:
    branches: [main, 'feature/*']
  pull_request:
    branches: [main]

jobs:
  web-smoke:
    name: Web Smoke Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: citylive
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: citylive
      DB_USER: root
      DB_PASS: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, pdo_mysql

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot && break
            sleep 2
          done

      - name: Import database schema
        run: mysql -h 127.0.0.1 -uroot citylive < sql/schema.sql

      - name: Start PHP built-in server
        run: |
          php -S 127.0.0.1:8000 -t . > php-server.log 2>&1 &
          sleep 3

      - name: Check homepage
        run: curl --fail --silent --show-error http://127.0.0.1:8000/index.php

      - name: Check register page
        run: curl --fail --silent --show-error http://127.0.0.1:8000/register.php

      - name: Check events page
        run: curl --fail --silent --show-error http://127.0.0.1:8000/events.php

      - name: Show PHP server logs if failed
        if: failure()
        run: cat php-server.log